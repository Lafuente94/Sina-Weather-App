name: Recoger datos meteo Soria

on:
  schedule:
    - cron: "0 * * * *"    # cada hora en punto (UTC)
  workflow_dispatch:         # permite lanzarlo a mano desde la web de GitHub

jobs:
  recoger:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests psycopg2-binary python-dotenv

      - name: Ejecutar el script
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          DATABASE_URL: ${{ secrets.DB_URL }}
        run: python aemet2postgres.py